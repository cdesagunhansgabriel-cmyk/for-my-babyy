<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Babyyy ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Floating Hearts -->
<div class="hearts"></div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Music Button -->
<button id="musicBtn">🎵</button>

<!-- Envelope -->
<div class="container">

    <div class="envelope" id="envelope">

        <div class="letter-preview">💌</div>

        <div class="tap-text">
            <h1>For My Babyyy ❤️</h1>
            <p>Tap the envelope to open it</p>
        </div>

    </div>

</div>

<!-- Letter -->
<div class="letter-page" id="letterPage">

    <div class="letter">

        <h1>To My Babyyy ❤️</h1>

        <p id="typingText"></p>

        <button id="closeBtn">
            Close ❤️
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
